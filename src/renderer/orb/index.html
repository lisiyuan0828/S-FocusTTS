
<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'"
    />
    <title>S-FocusTTS Orb</title>
    <link rel="stylesheet" href="./orb.css" />
  </head>
  <body>
    <!--
      .orb-hit 才是鼠标可点击的真正命中区（圆形按钮）
      外层 body/.orb 保持透明且穿透，只有球本体接收点击事件
      这样既能保证"左键停止/右键菜单"生效，又让窗口其余区域完全透明不阻挡
    -->
    <div class="orb" id="orb" data-state="idle" data-voice="silent" data-size="normal">
      <div class="orb-hit" id="orbHit" title="点击停止 · 右键打开菜单 · 拖动可移动位置">
        <canvas class="orb__canvas" id="orbCanvas"></canvas>
        <div class="orb__ring"></div>
        <div class="orb__spinner"></div>
      </div>
      <!-- 快捷键提示：默认不显示，由 main 根据配置推 onHint 决定 -->
      <div class="orb-hint" id="orbHint" hidden>
        <span class="orb-hint__kbd" id="orbHintKbd">—</span>
      </div>
    </div>
    <script type="module" src="./orb.ts"></script>
  </body>
</html>
